name: Build iOS IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build IPA (unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "BikerLog" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/BikerLog.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

          APP_PATH=$(find build/BikerLog.xcarchive/Products/Applications -maxdepth 1 -name "*.app" | head -1)
          mkdir -p build/output/Payload
          cp -R "$APP_PATH" build/output/Payload/
          cd build/output
          zip -r BikerLog.ipa Payload
          rm -rf Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: BikerLog-iOS
          path: ios/build/output/BikerLog.ipa
          retention-days: 7
