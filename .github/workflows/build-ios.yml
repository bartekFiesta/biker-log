name: Build iOS IPA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 */6 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build IPA (unsigned)
        run: |
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "BikerLog" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/BikerLog.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            archive

          # Extract .app and package as unsigned .ipa
          APP_PATH=$(find $RUNNER_TEMP/BikerLog.xcarchive -name "*.app" | head -1)
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r "$APP_PATH" $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -r $RUNNER_TEMP/BikerLog-unsigned.ipa Payload

      - name: Publish IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: BikerLog iOS build ${{ github.run_number }}
          files: ${{ runner.temp }}/BikerLog-unsigned.ipa
          prerelease: true
          make_latest: false
