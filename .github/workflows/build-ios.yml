name: Build iOS IPA

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 */6 * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-26
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Set iOS build number
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          node -e "
          const fs = require('fs');
          const app = JSON.parse(fs.readFileSync('app.json', 'utf8'));
          app.expo.ios.buildNumber = String(process.env.BUILD_NUMBER);
          app.expo.android.versionCode = Number(process.env.BUILD_NUMBER);
          fs.writeFileSync('app.json', JSON.stringify(app, null, 2) + '\n');
          "

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Build IPA (unsigned)
        env:
          BUILD_NUMBER: ${{ github.run_number }}
        run: |
          set -euo pipefail
          cd ios
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          IPA_NAME="BikerLog-ios-build-${BUILD_NUMBER}.ipa"
          ARCHIVE_PATH="$RUNNER_TEMP/BikerLog.xcarchive"
          STAGING_DIR="$RUNNER_TEMP/ipa-staging"
          IPA_PATH="$RUNNER_TEMP/$IPA_NAME"
          
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "BikerLog" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_ENTITLEMENTS="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            DEVELOPMENT_TEAM="" \
            archive

          APP_PATH=$(find "$ARCHIVE_PATH/Products/Applications" -name "*.app" -maxdepth 1 | head -1)
          if [ -z "$APP_PATH" ] || [ ! -d "$APP_PATH" ]; then
            echo "Could not find .app in archive"
            find "$ARCHIVE_PATH" -name "*.app"
            exit 1
          fi

          # Ad-hoc sign so AltStore receives a valid app bundle it can re-sign.
          /usr/bin/codesign --force --sign - --deep "$APP_PATH"

          rm -rf "$STAGING_DIR"
          mkdir -p "$STAGING_DIR/Payload"
          /bin/cp -R "$APP_PATH" "$STAGING_DIR/Payload/"
          cd "$STAGING_DIR"
          /usr/bin/ditto -c -k --sequesterRsrc --keepParent Payload "$IPA_PATH"

          echo "IPA_NAME=$IPA_NAME" >> "$GITHUB_ENV"
          echo "Built $IPA_PATH ($(du -h "$IPA_PATH" | cut -f1))"

      - name: Validate IPA
        run: |
          set -euo pipefail
          IPA_PATH="$RUNNER_TEMP/${{ env.IPA_NAME }}"
          /usr/bin/unzip -t "$IPA_PATH"
          /usr/bin/unzip -l "$IPA_PATH" | grep -q "Payload/.*\.app/Info.plist"
          APP_DIR=$(/usr/bin/unzip -l "$IPA_PATH" | awk '/Payload\/.*\.app\/Info.plist/ { sub(/\/Info.plist$/, "", $4); print $4; exit }')
          /usr/bin/unzip -p "$IPA_PATH" "$APP_DIR/Info.plist" > "$RUNNER_TEMP/Info.plist"
          EXEC=$(/usr/bin/plutil -extract CFBundleExecutable raw "$RUNNER_TEMP/Info.plist")
          /usr/bin/unzip -p "$IPA_PATH" "$APP_DIR/$EXEC" > "$RUNNER_TEMP/BikerLog.bin"
          /usr/bin/file "$RUNNER_TEMP/BikerLog.bin" | grep -q "arm64"
          echo "IPA validation passed"

      - name: Publish IPA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-build-${{ github.run_number }}
          name: BikerLog iOS build ${{ github.run_number }}
          body: |
            Install via AltServer on Windows (Install .IPA…).

            If you see **"The data couldn't be read because it isn't in the correct format"**, the IPA is usually fine — AltStore failed to talk to Apple (sign-in / re-sign). Try:
            - iTunes + iCloud from apple.com (not Microsoft Store)
            - Sign in to iTunes on PC, then install again
            - Same Wi‑Fi for PC and iPhone, USB connected
            - Switch network or use cellular on iPhone once
            - Download the `.ipa` on PC (not Safari HTML page); file must be ~14 MB
          files: ${{ runner.temp }}/${{ env.IPA_NAME }}
          prerelease: true
          make_latest: false
